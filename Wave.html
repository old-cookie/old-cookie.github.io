<!DOCTYPE html>
<html>
  <head>
    <title>Wave Generator</title>
    <style>
      /* TODO:CSS */
    </style>
    <script src="https://d3js.org/d3.v5.min.js"></script>
  </head>
  <body>
    <h1>Wave SVG Generator</h1>
    <form id="waveForm">
      <label for="waveType">Wave Type:</label>
      <select id="waveType" onchange="generateWave()">
        <option value="sine">Sine</option>
        <option value="square">Square</option>
        <!--TODO:Add more wave type-->
      </select>
      <label for="wavePosition">Wave Position:</label>
      <select id="wavePosition" onchange="generateWave()">
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
      </select>
      <label for="color">Color:</label>
      <input type="color" id="color" onchange="generateWave()" />
      <label for="transparency">Transparency:</label>
      <input
        type="range"
        id="transparency"
        min="0"
        max="1"
        step="0.1"
        onchange="generateWave()"
      />
      <label for="density">Density:</label>
      <input
        type="range"
        id="density"
        min="1"
        max="100"
        onchange="generateWave()"
      />
    </form>
    <div id="wavePreview"></div>
    <button type="button" onclick="downloadSVG()">Download SVG</button>
    <script>
      function generateWave() {
        var waveType = document.getElementById("waveType").value;
        var wavePosition = document.getElementById("wavePosition").value;
        var color = document.getElementById("color").value;
        var transparency = document.getElementById("transparency").value;
        var density = document.getElementById("density").value;
        var svgWidth = window.innerWidth;
        var waveData = d3.range(0, density).map(function (i) {
          return {
            x: i / density,
            y: (waveType === "sine" ? Math.sin : Math.cos)(
              ((2 * Math.PI * i * density) / 100) * Math.random()
            ),
          };
        });
        waveData.unshift({ x: 0, y: wavePosition === "top" ? 1 : -1 });
        waveData.push({ x: 1, y: wavePosition === "top" ? 1 : -1 });
        var line = d3
          .line()
          .x(function (d) {
            return d.x * svgWidth;
          })
          .y(function (d) {
            return 50 + (wavePosition === "top" ? -d.y * 50 : d.y * 50);
          })
          .curve(d3.curveBasis);
        d3.select("#wavePreview")
          .html("")
          .append("svg")
          .attr("width", svgWidth)
          .attr("height", "100px")
          .append("path")
          .datum(waveData)
          .attr("d", line)
          .attr("stroke", color)
          .attr("stroke-opacity", transparency)
          .attr("fill", color);
      }
      function downloadSVG() {
        var svg = document.querySelector("#wavePreview svg");
        var serializer = new XMLSerializer();
        var svgData = serializer.serializeToString(svg);
        var downloadLink = document.createElement("a");
        downloadLink.href = "data:image/svg+xml," + encodeURIComponent(svgData);
        downloadLink.download = "wave.svg";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
      }
    </script>
  </body>
</html>
