<!DOCTYPE html>
<html>
  <head>
    <title>Wave Generator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #141316;
      }
      form {
        width: 300px;
        display: flex;
        flex-direction: column;
        padding: 20px;
        border-radius: 8px;
      }
      .field {
        margin: 20px 0;
        position: relative;
      }
      .placeholder,
      input,
      button {
        transition: all 0.3s ease;
      }
      input {
        width: 100%;
        padding: 10px;
        background-color: transparent;
        border: 2px solid #666;
        border-radius: 5px;
      }
      input:focus {
        outline: none;
        border-color: #ccc;
      }
      .placeholder {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1;
        color: #ccc;
      }
      input:focus + .placeholder {
        top: -20px;
        left: 0;
        font-size: 12px;
      }
      button {
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #f1f1f1;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <form>
      <!--TODO:add database-->
      <div class="field">
        <input type="text" name="username" id="username" required />
        <label for="username" class="placeholder">Username</label>
      </div>
      <div class="field">
        <input type="password" name="password" id="password" required />
        <label for="password" class="placeholder">Password</label>
      </div>
      <!--TODO:Add register-->
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
