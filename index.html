<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>blob edit</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <span id="result">&nbsp;</span>
      <div id="blob"></div>
      <div class="controls">
        <div class="height">
          <input
            class="radius"
            id="height"
            max="200"
            min="0"
            step="1"
            type="range"
            value="200"
          />
        </div>
        <div class="width">
          <input
            class="radius"
            id="width"
            max="200"
            min="0"
            step="1"
            type="range"
            value="200"
          />
        </div>
        <div class="topleft">
          <input
            class="radius"
            id="topLeft"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
          <input
            class="radius"
            id="topLeft2"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
        </div>
        <div class="topright">
          <input
            class="radius"
            id="topRight"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
          <input
            class="radius"
            id="topRight2"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
        </div>
        <div class="bottomright">
          <input
            class="radius"
            id="bottomRight"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
          <input
            class="radius"
            id="bottomRight2"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
        </div>
        <div class="bottomleft">
          <input
            class="radius"
            id="bottomLeft"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
          <input
            class="radius"
            id="bottomLeft2"
            max="2000"
            min="0"
            step="1"
            type="range"
            value="500"
          />
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
