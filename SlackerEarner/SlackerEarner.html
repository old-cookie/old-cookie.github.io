<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Slacker Earner</title>
    <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
    <link rel="stylesheet" href="SlackerEarner.css">
    <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>
</head>

<body>
    <header class="app-header">
        <h1 id="app-title">Slacker Earner</h1>
        <div class="controls">
            <button id="open-records" data-variant="secondary" type="button">Records</button>
            <button id="open-settings" data-variant="secondary" type="button">Settings</button>
        </div>
    </header>

    <!-- Import dialog using native dialog (semantic, Oat-friendly) -->
    <dialog id="import-modal" aria-labelledby="import-modal-title">
        <form method="dialog">
            <h3 id="import-modal-title">Import</h3>
            <div id="import-modal-body">
                <div id="import-errors" style="color:#900"></div>
                <div class="import-options">
                    <label><input type="radio" name="import-mode" value="merge" checked> Merge with existing
                        data</label>
                    <label><input type="radio" name="import-mode" value="overwrite"> Overwrite existing data</label>
                </div>
            </div>
            <menu class="modal-actions" style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
                <button id="import-confirm" data-variant="primary">Confirm</button>
                <button id="import-cancel">Cancel</button>
            </menu>
        </form>
    </dialog>

    <main class="app-grid">
        <section class="card settings">
            <h2 data-i18n="settings">Settings</h2>
            <div class="modes">
                <label><input type="radio" name="mode" value="part-time" checked> <span
                        data-i18n="part_time">Part-time</span></label>
                <label><input type="radio" name="mode" value="full-time"> <span
                        data-i18n="full_time">Full-time</span></label>
            </div>
            <div class="inputs">
                <div class="field" id="field-hourly">
                    <label data-i18n="hourly_rate">Hourly rate</label>
                    <input id="hourly-rate" type="number" min="0" step="0.01">
                </div>
                <div class="field" id="field-monthly" style="display:none">
                    <label data-i18n="monthly_salary">Monthly salary</label>
                    <input id="monthly-salary" type="number" min="0" step="0.01">
                </div>
                <div class="field">
                    <label data-i18n="work_hours_per_day">Work hours per day</label>
                    <input id="work-hours" type="number" min="0" step="0.1" value="8">
                </div>
                <div class="field">
                    <label data-i18n="day_salary">Day salary</label>
                    <output id="day-salary" class="field-output">0</output>
                </div>
                <div class="field" id="field-work-days" style="display:none">
                    <label data-i18n="work_days_per_month">Work days per month</label>
                    <input id="work-days" type="number" min="1" step="1" value="22">
                </div>
            </div>
        </section>

        <section class="card slackers">
            <h2 data-i18n="slackers">Slacker Types</h2>
            <div id="slacker-list" class="slacker-list"></div>
            <div class="add-s">
                <input id="new-slacker" placeholder="Add a slacker type">
                <button id="add-slacker" data-variant="primary">Add</button>
            </div>
        </section>

        <section class="card today">
            <h2 data-i18n="today">Today</h2>
            <div class="stats">
                <div><strong data-i18n="total_break">Total break</strong>: <span id="total-break">0h</span></div>
                <div><strong data-i18n="extra_earn_money">Extra earn money</strong>: <span id="lost-money">0</span>
                </div>
            </div>
        </section>
    </main>

    <script src="SlackerEarner.js"></script>
</body>

</html>
